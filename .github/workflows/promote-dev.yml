name: Promote Dev to Main

on:
  schedule:
    # Run at 00:00 every 2 days
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allow manual triggering if needed

permissions:
  contents: read
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Check for changes and open PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Exit if there are no changes to promote
          if git diff --quiet origin/main..origin/dev; then
            echo "No changes. origin/main is up-to-date with origin/dev."
            exit 0
          fi
          
          # Check if an open PR from dev -> main already exists
          EXISTING_PR=$(gh pr list --state open --base main --head dev --json number --jq '.[0].number')
          
          if [ "$EXISTING_PR" != "null" ] && [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists. New commits to 'dev' will automatically be included."
          else
            echo "Creating a new promotion PR..."
            gh pr create \
              --base main \
              --head dev \
              --title "chore(release): 🚀 auto-promote dev to main" \
              --body "## 🔄 Automated Release Promotion
              
This is a scheduled PR to promote the latest tested changes from \`dev\` into the \`main\` production branch.

**Note:** Any additional commits pushed to \`dev\` while this PR remains open will automatically be synced and appended here."
          fi
