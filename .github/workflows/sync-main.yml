name: Sync Main to Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-main-to-dev
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  sync_to_dev:
    runs-on: ubuntu-latest
    steps:
      - name: Require automation token
        env:
          AUTOMATION_PAT: ${{ secrets.AUTOMATION_PAT }}
        run: |
          if [ -z "$AUTOMATION_PAT" ]; then
            echo "::error::AUTOMATION_PAT is required so reverse-sync PRs trigger CI."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Open reverse-sync PR and enable auto-merge
        uses: ./.github/actions/branch-sync
        with:
          base: dev
          head: main
          title: "chore(sync): auto-sync main into dev"
          body: |
            Automated reverse sync after `main` was updated.

            Keeps `dev` aligned with merge commits on `main`.
          auto_merge: "true"
          token: ${{ secrets.AUTOMATION_PAT }}
