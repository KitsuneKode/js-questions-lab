name: Sync Main to Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_to_dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes, open PR, and auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Verify dev exists locally to trace history
          git fetch origin dev
          
          # Check if dev is missing any commits from main
          if git diff --quiet origin/dev..origin/main; then
            echo "No changes. dev is up-to-date with main."
            exit 0
          fi
          
          echo "Changes detected. Creating reverse-sync PR..."
          
          EXISTING_PR=$(gh pr list --state open --base dev --head main --json number --jq '.[0].number')
          
          if [ "$EXISTING_PR" != "null" ] && [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists. Engaging auto-merge flag..."
            gh pr merge "$EXISTING_PR" --auto --merge || echo "Auto-merge might already be enabled or repo settings prevent it."
          else
            PR_URL=$(gh pr create \
              --base dev \
              --head main \
              --title "chore(sync): 🔄 auto-sync main into dev" \
              --body "## 🔄 Automated Reverse Sync
              
              This PR automatically catches \`dev\` up with recent commits pushed directly to \`main\`. 
              
              Ensures branch alignment and parity.")
            
            echo "Setting auto-merge for $PR_URL"
            gh pr merge "$PR_URL" --auto --merge || echo "Warning: Could not enable auto-merge. Ensure 'Allow auto-merge' is enabled in repo settings."
          fi
