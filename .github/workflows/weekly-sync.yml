name: Weekly Upstream Sync

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Refresh canonical Lydia Hallie source and generated data
        run: bun run content:refresh

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(content): weekly sync from upstream javascript-questions'
          title: 'chore(content): weekly upstream sync'
          body: |
            Automated weekly refresh from https://github.com/lydiahallie/javascript-questions.

            Source of truth:
            - `content/source/README.upstream.md` is the canonical upstream snapshot from Lydia Hallie's repo
            - `content/generated/*.json` is regenerated from that source

            This PR updates:
            - content/source/README.upstream.md
            - content/generated/questions.v1.json
            - content/generated/manifest.v1.json
          branch: chore/weekly-content-sync
          delete-branch: true
          labels: |
            content
            automation
